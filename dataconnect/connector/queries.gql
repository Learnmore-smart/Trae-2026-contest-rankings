# ─── Stats ────────────────────────────────────────────────────────────────────
# Powers the stats bar. Uses aliases to run multiple aggregations in one round
# trip. evaluatedCount counts topics with status JUDGED. NOT evaluatedAt: this
# looked equivalent but isn't — UpdateTopicEvaluationState (the scraper's
# "reset to needs_judging sentinel" call, run on every scrape, not just real
# judging) unconditionally sets evaluatedAt_expr: "request.time", so evaluatedAt
# goes non-null the moment a topic is scraped, long before it's actually judged.
# status only flips to JUDGED inside judgeChangedTraeTopics, so it's the
# unambiguous signal.
query GetStats @auth(level: PUBLIC, insecureReason: "Stats are public.") {
  signupCount: topics(where: { sourceType: { eq: SIGNUP } }) { _count }
  preliminaryCount: topics(where: { sourceType: { eq: PRELIMINARY } }) { _count }
  evaluatedCount: topics(
    where: { sourceType: { eq: PRELIMINARY }, status: { eq: JUDGED } }
  ) { _count }
  matchedCount: matches(where: { signupTopicId: { isNull: false } }) { _count }
  modelTokenUsages {
    input_sum
    output_sum
  }
  # lastUpdatedAt: max timestamp across the mutable collections.
  topics { updatedAt_max }
  evaluations { createdAt_max }
  matches { updatedAt_max }
}

# ─── Online count ─────────────────────────────────────────────────────────────
# Single indexed COUNT(*) — replaces the Firestore pattern of reading every
# presence doc per heartbeat. At 1000 concurrent users this is ~$6,500/month on
# Firestore; on SQL it's one cheap indexed query.
query GetOnlineCount($onlineSince: Timestamp!) @auth(level: PUBLIC, insecureReason: "Online count is public.") {
  presences(where: { lastSeenAt: { ge: $onlineSince } }) { _count }
}

# ─── Latest run (cache version key) ───────────────────────────────────────────
# The board cache uses the latest run's startedAt/finishedAt/status as a version
# key: it only rebuilds when the pipeline mutates data. One cheap indexed query.
query GetLatestRun @auth(level: PUBLIC, insecureReason: "Run history is public.") {
  runs(orderBy: [{ startedAt: DESC }], limit: 1) {
    id
    type
    sourceType
    startedAt
    finishedAt
    status
  }
}

# ─── Run history (admin UI) ───────────────────────────────────────────────────
query ListRuns($limit: Int!) @auth(level: PUBLIC, insecureReason: "Run history is public.") {
  runs(orderBy: [{ startedAt: DESC }], limit: $limit) {
    id
    type
    sourceType
    startedAt
    finishedAt
    status
    pagesScanned
    topicsFound
    topicsCreated
    topicsUpdated
    evaluatedCount
    failedCount
    matchedCount
    logs
    error
  }
}

# ─── Scraper cursor (pipeline only) ───────────────────────────────────────────
query GetScrapeCursor($sourceType: TraeSourceType!) @auth(level: NO_ACCESS) {
  scrapeCursors(where: { sourceType: { eq: $sourceType } }) {
    sourceType
    nextPage
    totalSeen
    lastRunAt
    lastCompletedCycleAt
  }
}

# ─── Topics by Source Type (pipeline only) ────────────────────────────────────
query GetTopicsBySourceType($sourceType: TraeSourceType!, $offset: Int = 0) @auth(level: NO_ACCESS) {
  topics(
    where: { sourceType: { eq: $sourceType } }
    # Stable offset pagination requires a unique final sort key; without ORDER BY, paging repeats
    # and skips rows (the matcher/judge then miss topics and double-count others).
    orderBy: [{ id: ASC }]
    limit: 1000
    offset: $offset
  ) {
    id
    sourceType
    externalTopicId
    slug
    title
    url
    authorName
    authorAvatarUrl
    track
    tags
    replyCount
    viewCount
    likeCount
    createdAtExternal
    lastActivityAtExternal
    scrapedAt
    updatedAt
    contentText
    contentHtml
    excerpt
    demoUrl
    attachmentUrls
    imageUrls
    sessionIds
    traeEvidence
    contentHash
    status
    totalScore
    innovationScore
    practicalityScore
    completionScore
    designScore
    complianceRiskScore
    directionConsistencyScore
    confidenceScore
    competitionLevel
    evaluatedAt
  }
}
