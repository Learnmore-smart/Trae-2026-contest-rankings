# TRAE Contest 2026 — SQL Connect queries
#
# Auth model:
#   - Board reads are PUBLIC (the leaderboard is a public page).
#   - All queries are invoked server-side from Next.js API routes via the Admin
#     SDK, which bypasses @auth. The @auth directives declare intent and protect
#     against direct client calls if the connector ID leaks.

# ─── Board data ───────────────────────────────────────────────────────────────
# The board cache: fetches every preliminary topic with its latest evaluation
# and match, joined in one query. Cached in-memory for ~15s (same pattern as the
# old Firestore boardCache). SQL has no per-read billing, so scanning the full
# preliminary set per cache miss is cheap. Sort/paginate happens in app code,
# matching the existing listRankedTopics implementation.
query GetBoardData @auth(level: PUBLIC, insecureReason: "Leaderboard is public.") {
  topics(
    where: { sourceType: { eq: PRELIMINARY } }
    orderBy: [{ totalScore: DESC }, { id: ASC }]
    limit: 1000
  ) {
    id
    sourceType
    externalTopicId
    slug
    title
    url
    authorName
    authorAvatarUrl
    track
    tags
    replyCount
    viewCount
    likeCount
    createdAtExternal
    lastActivityAtExternal
    scrapedAt
    updatedAt
    contentText
    excerpt
    demoUrl
    attachmentUrls
    imageUrls
    sessionIds
    traeEvidence
    contentHash
    status
    # Denormalized scores — power sort/filter directly on Topic, no JOIN.
    totalScore
    innovationScore
    practicalityScore
    completionScore
    designScore
    complianceRiskScore
    directionConsistencyScore
    confidenceScore
    competitionLevel
    evaluatedAt
    # Latest evaluation (1:many → take newest by createdAt). Lightened — drops
    # promptText/systemPrompt/rawModelResponse/llmCallLogs to keep payload small.
    evaluations_on_topic(orderBy: [{ createdAt: DESC }], limit: 1) {
      id
      provider
      model
      promptVersion
      totalScore
      innovationScore
      practicalityScore
      completionScore
      designScore
      complianceRiskScore
      directionConsistencyScore
      confidenceScore
      competitionLevel
      summary
      strengths
      weaknesses
      suggestions
      complianceRisks
      dimensionComments
      matchComment
      inputTokens
      outputTokens
      error
      createdAt
    }
    # Match (1:1 via @unique preliminaryTopicId).
    match_on_preliminaryTopic {
      id
      preliminaryTopicId
      signupTopicId
      preliminaryAuthorName
      signupAuthorName
      matchMethod
      matchConfidence
      titleSimilarity
      directionConsistencyScore
      directionConsistencyComment
      mismatchRisk
      createdAt
      updatedAt
    }
  }
}

# Paged version of the public board query. Each call stays bounded, while the
# server can assemble the full contest board by walking offsets.
query GetBoardPage($limit: Int!, $offset: Int!) @auth(level: PUBLIC, insecureReason: "Leaderboard is public.") {
  topics(
    where: { sourceType: { eq: PRELIMINARY } }
    # id (unique PK) is the final sort key so offset pagination is STABLE — without it, thousands
    # of topics tie on totalScore (-1/null) and Postgres returns them in a shifting order across
    # pages, so a full walk repeats and skips rows (inflated counts, judge missing topics).
    orderBy: [{ totalScore: DESC }, { id: ASC }]
    limit: $limit
    offset: $offset
  ) {
    id
    sourceType
    externalTopicId
    slug
    title
    url
    authorName
    authorAvatarUrl
    track
    tags
    replyCount
    viewCount
    likeCount
    createdAtExternal
    lastActivityAtExternal
    scrapedAt
    updatedAt
    contentText
    excerpt
    demoUrl
    attachmentUrls
    imageUrls
    sessionIds
    traeEvidence
    contentHash
    status
    totalScore
    innovationScore
    practicalityScore
    completionScore
    designScore
    complianceRiskScore
    directionConsistencyScore
    confidenceScore
    competitionLevel
    evaluatedAt
    evaluations_on_topic(orderBy: [{ createdAt: DESC }], limit: 1) {
      id
      provider
      model
      promptVersion
      totalScore
      innovationScore
      practicalityScore
      completionScore
      designScore
      complianceRiskScore
      directionConsistencyScore
      confidenceScore
      competitionLevel
      summary
      strengths
      weaknesses
      suggestions
      complianceRisks
      dimensionComments
      matchComment
      inputTokens
      outputTokens
      error
      createdAt
    }
    match_on_preliminaryTopic {
      id
      preliminaryTopicId
      signupTopicId
      preliminaryAuthorName
      signupAuthorName
      matchMethod
      matchConfidence
      titleSimilarity
      directionConsistencyScore
      directionConsistencyComment
      mismatchRisk
      createdAt
      updatedAt
    }
  }
}

