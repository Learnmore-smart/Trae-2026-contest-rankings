  $strengths: [String!]
  $weaknesses: [String!]
  $suggestions: [String!]
  $complianceRisks: [String!]
  $dimensionComments: Any
  $matchComment: String
  $promptText: String
  $systemPrompt: String
  $inputTokens: Int
  $outputTokens: Int
  $rawModelResponse: String!
  $llmCallLogs: [Any!]
