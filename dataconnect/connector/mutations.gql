) @auth(level: NO_ACCESS) {
  evaluation_upsert(data: {
    id: $id
    topicId: $topicId
    sourceType: $sourceType
    provider: $provider
    model: $model
    promptVersion: $promptVersion
    totalScore: $totalScore
    innovationScore: $innovationScore
    practicalityScore: $practicalityScore
    completionScore: $completionScore
    designScore: $designScore
    complianceRiskScore: $complianceRiskScore
    directionConsistencyScore: $directionConsistencyScore
    confidenceScore: $confidenceScore
    competitionLevel: $competitionLevel
    summary: $summary
    strengths: $strengths
    weaknesses: $weaknesses
    suggestions: $suggestions
    complianceRisks: $complianceRisks
    dimensionComments: $dimensionComments
    matchComment: $matchComment
    promptText: $promptText
    systemPrompt: $systemPrompt
    inputTokens: $inputTokens
    outputTokens: $outputTokens
    rawModelResponse: $rawModelResponse
    llmCallLogs: $llmCallLogs
    error: $error
    createdAt_expr: "request.time"
