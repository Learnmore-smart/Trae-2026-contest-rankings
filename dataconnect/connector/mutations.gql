# ─── Match (matcher writes) ───────────────────────────────────────────────────
mutation UpsertMatch(
  $id: String!
  $preliminaryTopicId: String!
  $signupTopicId: String
  $preliminaryAuthorName: String!
  $signupAuthorName: String
  $matchMethod: MatchMethod!
  $matchConfidence: Float!
  $titleSimilarity: Float
  $directionConsistencyScore: Float
  $directionConsistencyComment: String
  $mismatchRisk: MismatchRisk!
) @auth(level: NO_ACCESS) {
  match_upsert(data: {
    id: $id
    preliminaryTopicId: $preliminaryTopicId
    signupTopicId: $signupTopicId
    preliminaryAuthorName: $preliminaryAuthorName
    signupAuthorName: $signupAuthorName
    matchMethod: $matchMethod
    matchConfidence: $matchConfidence
    titleSimilarity: $titleSimilarity
    directionConsistencyScore: $directionConsistencyScore
    directionConsistencyComment: $directionConsistencyComment
    mismatchRisk: $mismatchRisk
    createdAt_expr: "request.time"
    updatedAt_expr: "request.time"
  })
}

# ─── Run (pipeline start) ─────────────────────────────────────────────────────
mutation UpsertRun(
  $id: String!
  $type: TraeRunType!
  $sourceType: TraeSourceType
  $status: TraeRunStatus!
) @auth(level: NO_ACCESS) {
  run_upsert(data: {
    id: $id
    type: $type
    sourceType: $sourceType
    status: $status
    startedAt_expr: "request.time"
  })
}

# ─── Run (pipeline finish) ────────────────────────────────────────────────────
# Updates only the finish-time fields; leaves startedAt intact. Uses _update so
# the caller doesn't have to re-pass type/sourceType.
mutation FinishRun(
  $id: String!
  $status: TraeRunStatus!
  $pagesScanned: Int
  $topicsFound: Int
  $topicsCreated: Int
  $topicsUpdated: Int
  $evaluatedCount: Int
  $failedCount: Int
  $matchedCount: Int
  $logs: [String!]
  $error: String
) @auth(level: NO_ACCESS) {
  run_update(
    id: $id
    data: {
      status: $status
      finishedAt_expr: "request.time"
      pagesScanned: $pagesScanned
      topicsFound: $topicsFound
      topicsCreated: $topicsCreated
      topicsUpdated: $topicsUpdated
      evaluatedCount: $evaluatedCount
      failedCount: $failedCount
      matchedCount: $matchedCount
      logs: $logs
      error: $error
    }
  )
}

# ─── Presence (public heartbeat) ──────────────────────────────────────────────
# Called on every board load / heartbeat. lastSeenAt is indexed so the online
# count query is a cheap range scan, not a full-table read.
mutation UpsertPresence(
  $sessionId: String!
  $userAgentHash: String
) @auth(level: PUBLIC, insecureReason: "Presence heartbeat is public.") {
  presence_upsert(data: {
    sessionId: $sessionId
    userAgentHash: $userAgentHash
    lastSeenAt_expr: "request.time"
  })
}

# ─── Model token usage (judge writes) ─────────────────────────────────────────
mutation UpsertModelTokenUsage(
  $id: String!
  $provider: TraeAiProvider!
  $model: String!
  $input: Int!
  $output: Int!
) @auth(level: NO_ACCESS) {
  modelTokenUsage_upsert(data: {
    id: $id
    provider: $provider
    model: $model
    input: $input
    output: $output
    updatedAt_expr: "request.time"
  })
}

# ─── Scrape cursor (scraper resume) ───────────────────────────────────────────
mutation UpsertScrapeCursor(
  $sourceType: TraeSourceType!
  $nextPage: Int!
  $totalSeen: Int!
  $lastCompletedCycleAt: Timestamp
) @auth(level: NO_ACCESS) {
  scrapeCursor_upsert(data: {
    sourceType: $sourceType
    nextPage: $nextPage
    totalSeen: $totalSeen
    lastRunAt_expr: "request.time"
    lastCompletedCycleAt: $lastCompletedCycleAt
  })
}

