# TRAE Contest 2026 — SQL Connect mutations
#
# Auth model:
#   - Presence heartbeat is PUBLIC (any visitor can record presence).
#   - All pipeline mutations (Topic/Evaluation/Match/Run/TokenUsage/ScrapeCursor)
#     are NO_ACCESS — they run server-side via the Admin SDK, which bypasses @auth.
#     The NO_ACCESS level prevents direct client calls if the connector ID leaks.
#   - Server timestamps use `_expr: "request.time"` so the DB clock is authoritative.

# ─── Topic (scraper writes) ───────────────────────────────────────────────────
mutation UpsertTopic(
  $id: String!
  $sourceType: TraeSourceType!
  $externalTopicId: String!
  $slug: String!
  $title: String!
  $url: String!
  $authorName: String!
  $authorAvatarUrl: String
  $track: String
  $tags: [String!]
  $replyCount: Int
  $viewCount: Int
  $likeCount: Int
  $createdAtExternal: Timestamp
  $lastActivityAtExternal: Timestamp
  $contentText: String!
  $contentHtml: String
  $excerpt: String!
  $demoUrl: String
  $attachmentUrls: [String!]
  $imageUrls: [String!]
  $sessionIds: [String!]
  $traeEvidence: Any
  $contentHash: String!
  $status: TraeTopicStatus!
  $rawJson: Any
  $rawHtml: String
) @auth(level: NO_ACCESS) {
  topic_upsert(data: {
    id: $id
    sourceType: $sourceType
    externalTopicId: $externalTopicId
    slug: $slug
    title: $title
    url: $url
    authorName: $authorName
    authorAvatarUrl: $authorAvatarUrl
    track: $track
    tags: $tags
    replyCount: $replyCount
    viewCount: $viewCount
    likeCount: $likeCount
    createdAtExternal: $createdAtExternal
    lastActivityAtExternal: $lastActivityAtExternal
    scrapedAt_expr: "request.time"
    updatedAt_expr: "request.time"
    contentText: $contentText
    contentHtml: $contentHtml
    excerpt: $excerpt
    demoUrl: $demoUrl
    attachmentUrls: $attachmentUrls
    imageUrls: $imageUrls
    sessionIds: $sessionIds
    traeEvidence: $traeEvidence
    contentHash: $contentHash
    status: $status
    rawJson: $rawJson
    rawHtml: $rawHtml
  })
}

# ─── Topic evaluation state (judge writes denormalized scores) ────────────────
# After the judge writes an Evaluation, it mirrors the scores + status onto the
# Topic row so the leaderboard can sort/filter without a JOIN. Uses _update so
# only the listed fields change (scraper-owned fields like contentText stay).
mutation UpdateTopicEvaluationState(
  $id: String!
  $status: TraeTopicStatus!
  $totalScore: Float
  $innovationScore: Float
  $practicalityScore: Float
  $completionScore: Float
  $designScore: Float
  $complianceRiskScore: Float
  $directionConsistencyScore: Float
  $confidenceScore: Float
  $competitionLevel: CompetitionLevel
) @auth(level: NO_ACCESS) {
  topic_update(
    id: $id
    data: {
      status: $status
      totalScore: $totalScore
      innovationScore: $innovationScore
      practicalityScore: $practicalityScore
      completionScore: $completionScore
      designScore: $designScore
      complianceRiskScore: $complianceRiskScore
      directionConsistencyScore: $directionConsistencyScore
      confidenceScore: $confidenceScore
      competitionLevel: $competitionLevel
      evaluatedAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  )
}

